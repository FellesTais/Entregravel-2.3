info:
  name: Criar coordenada
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/geolocation
  body:
    type: json
    data: |-
      {
        "latitude": -23.5505,
        "longitude": -46.6333
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
